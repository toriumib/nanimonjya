buildscript {
    ext.kotlin_version = '1.9.10'
    repositories {
        google()
        mavenCentral()
    }


    dependencies {
        classpath 'com.android.tools.build:gradle:8.6.0' // 16KBページサイズ対応のため8.5.1+
        classpath 'com.google.gms:google-services:4.3.15'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
    // flutter_tts 4.2.x が引き込む kotlin-stdlib 2.2.x は、本プロジェクトの
    // Kotlin 1.9.10 コンパイラが読めずビルドが落ちる。stdlib を 1.9.10 に固定して整合させる
    // （flutter_tts は apply/put/let 等の基本APIしか使っておらず 1.9 stdlib で十分）。
    configurations.all {
        resolutionStrategy.eachDependency { details ->
            if (details.requested.group == 'org.jetbrains.kotlin' &&
                    details.requested.name.startsWith('kotlin-stdlib')) {
                details.useVersion '1.9.10'
            }
        }
    }
}

rootProject.buildDir = '../build'
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(':app')
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}