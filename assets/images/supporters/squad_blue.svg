<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- SD応援団・青（クール・腕組み・パーマ） -->
  <!-- 脚 -->
  <path d="M44 86 L44 93" stroke="#1B1E2A" stroke-width="6" stroke-linecap="round"/>
  <path d="M56 86 L56 93" stroke="#1B1E2A" stroke-width="6" stroke-linecap="round"/>
  <!-- 学ラン（小さなボディ） -->
  <path d="M36 66 Q50 62 64 66 L62 88 L38 88 Z" fill="#262A3A" stroke="#12141C" stroke-width="1.8" stroke-linejoin="round"/>
  <path d="M50 64 L50 88" stroke="#12141C" stroke-width="1.6"/>
  <circle cx="50" cy="70" r="1.3" fill="#E8C24A"/><circle cx="50" cy="76" r="1.3" fill="#E8C24A"/><circle cx="50" cy="82" r="1.3" fill="#E8C24A"/>
  <!-- 腕組み -->
  <path d="M37 70 Q50 78 63 70" fill="none" stroke="#12141C" stroke-width="6.5" stroke-linecap="round"/>
  <!-- 顔（大きい） -->
  <circle cx="50" cy="38" r="24" fill="#F3D2AC" stroke="#C99A6E" stroke-width="1.4"/>
  <!-- パーマ髪（もこもこ・前面） -->
  <g fill="#241E1A" stroke="#0E0B09" stroke-width="1.6">
    <circle cx="32" cy="24" r="8"/><circle cx="42" cy="18" r="8.5"/><circle cx="52" cy="16" r="8.5"/>
    <circle cx="62" cy="19" r="8"/><circle cx="70" cy="26" r="7"/><circle cx="30" cy="32" r="6"/>
  </g>
  <!-- 青ハチマキ -->
  <path d="M28 30 L72 30 L72 37 L28 37 Z" fill="#2E7FD4" stroke="#1B569A" stroke-width="1.6"/>
  <path d="M72 31 L84 27 L80 38 L72 36 Z" fill="#2E7FD4" stroke="#1B569A" stroke-width="1.6"/>
  <!-- 目（クール・切れ長ハイライト） -->
  <ellipse cx="40" cy="42" rx="4.4" ry="4.8" fill="#FFFFFF"/>
  <ellipse cx="60" cy="42" rx="4.4" ry="4.8" fill="#FFFFFF"/>
  <ellipse cx="40" cy="43" rx="3.2" ry="3.6" fill="#3B4A66"/>
  <ellipse cx="60" cy="43" rx="3.2" ry="3.6" fill="#3B4A66"/>
  <circle cx="41.2" cy="41.5" r="1.3" fill="#FFFFFF"/>
  <circle cx="61.2" cy="41.5" r="1.3" fill="#FFFFFF"/>
  <!-- 半目ライン（涼しげ） -->
  <path d="M34.5 40 Q40 38 45.5 40 M54.5 40 Q60 38 65.5 40" fill="none" stroke="#241E1A" stroke-width="1.6" stroke-linecap="round"/>
  <!-- 鼻・クールな口 -->
  <path d="M50 45 L49.4 48" stroke="#C99A6E" stroke-width="1.4" stroke-linecap="round"/>
  <path d="M45 51 L55 51" stroke="#8A6242" stroke-width="1.8" stroke-linecap="round"/>
</svg>
