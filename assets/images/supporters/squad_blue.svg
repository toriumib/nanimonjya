<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 応援団・青: 長身でクールな切れ長の目、パーマ髪の団員（オリジナル） -->
  <!-- 学ラン -->
  <path d="M32 58 L68 58 L70 96 L30 96 Z" fill="#23283C" stroke="#11141F" stroke-width="2.5" stroke-linejoin="round"/>
  <path d="M50 58 L50 96" stroke="#11141F" stroke-width="2"/>
  <circle cx="50" cy="68" r="1.8" fill="#E8C24A"/>
  <circle cx="50" cy="78" r="1.8" fill="#E8C24A"/>
  <circle cx="50" cy="88" r="1.8" fill="#E8C24A"/>
  <path d="M42 58 L50 66 L58 58" fill="none" stroke="#11141F" stroke-width="2"/>
  <!-- 腕組み -->
  <path d="M32 66 Q50 76 68 66" fill="none" stroke="#11141F" stroke-width="7" stroke-linecap="round"/>
  <!-- 顔（面長） -->
  <ellipse cx="50" cy="36" rx="17" ry="20" fill="#EDC9A4" stroke="#B08A5E" stroke-width="2"/>
  <!-- パーマ髪（もこもこ） -->
  <g fill="#26201C" stroke="#100D0B" stroke-width="1.8">
    <circle cx="36" cy="22" r="7"/><circle cx="44" cy="17" r="7.5"/><circle cx="53" cy="15" r="7.5"/>
    <circle cx="62" cy="19" r="7"/><circle cx="66" cy="27" r="6"/><circle cx="33" cy="30" r="5.5"/>
  </g>
  <!-- 青ハチマキ -->
  <path d="M33 28 L67 28 L67 34 L33 34 Z" fill="#2E7FD4" stroke="#1B569A" stroke-width="1.8"/>
  <path d="M67 29 L76 26 L73 34 L67 33 Z" fill="#2E7FD4" stroke="#1B569A" stroke-width="1.8"/>
  <!-- 切れ長の涼しい目（半目） -->
  <path d="M39 41 L48 41" stroke="#26201C" stroke-width="2.8" stroke-linecap="round"/>
  <path d="M55 41 L64 41" stroke="#26201C" stroke-width="2.8" stroke-linecap="round"/>
  <path d="M39 38 L48 37.5 M55 37.5 L64 38" stroke="#26201C" stroke-width="1.4" stroke-linecap="round"/>
  <!-- 鼻・すずしい口元 -->
  <path d="M51 44 L50 48" stroke="#B08A5E" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M45 52 Q50 53.5 55 52" fill="none" stroke="#8A6242" stroke-width="2" stroke-linecap="round"/>
  <!-- あごひげの影 -->
  <path d="M43 54 Q50 58 57 54" fill="none" stroke="#C9A87E" stroke-width="1.4" stroke-linecap="round" opacity="0.7"/>
</svg>
