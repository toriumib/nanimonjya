<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- SD応援団・赤（熱血団長・拳突き上げ・角刈り・極太眉） -->
  <!-- 脚 -->
  <path d="M44 86 L44 93" stroke="#1B1E2A" stroke-width="6" stroke-linecap="round"/>
  <path d="M56 86 L56 93" stroke="#1B1E2A" stroke-width="6" stroke-linecap="round"/>
  <!-- 学ラン -->
  <path d="M35 66 Q50 62 65 66 L63 88 L37 88 Z" fill="#262A3A" stroke="#12141C" stroke-width="1.8" stroke-linejoin="round"/>
  <path d="M50 64 L50 88" stroke="#12141C" stroke-width="1.6"/>
  <circle cx="50" cy="70" r="1.3" fill="#E8C24A"/><circle cx="50" cy="76" r="1.3" fill="#E8C24A"/><circle cx="50" cy="82" r="1.3" fill="#E8C24A"/>
  <!-- 左腕（下） -->
  <path d="M37 70 Q43 76 49 74" fill="none" stroke="#12141C" stroke-width="6" stroke-linecap="round"/>
  <!-- 右腕：拳を突き上げ -->
  <path d="M63 68 L74 44" fill="none" stroke="#12141C" stroke-width="6.5" stroke-linecap="round"/>
  <circle cx="75" cy="40" r="5.5" fill="#F0BE94" stroke="#B4835A" stroke-width="1.6"/>
  <!-- 顔（角ばりぎみ） -->
  <path d="M28 30 Q28 16 50 15 Q72 16 72 30 L71 46 Q68 58 50 59 Q32 58 29 46 Z" fill="#F0BE94" stroke="#B4835A" stroke-width="1.4" stroke-linejoin="round"/>
  <!-- 角刈り -->
  <path d="M28 30 Q28 13 50 12 Q72 13 72 30 L72 31 L28 31 Z" fill="#1E1A16" stroke="#0D0B09" stroke-width="1.6" stroke-linejoin="round"/>
  <path d="M30 30 L34 24 M38 30 L42 22 M46 30 L50 21 M54 30 L58 22 M62 30 L66 24" stroke="#1E1A16" stroke-width="2" stroke-linecap="round"/>
  <!-- 赤ハチマキ -->
  <path d="M28 31 L72 31 L72 38 L28 38 Z" fill="#E23B2E" stroke="#9E2620" stroke-width="1.6"/>
  <path d="M28 32 L16 28 L20 39 L28 37 Z" fill="#E23B2E" stroke="#9E2620" stroke-width="1.6"/>
  <!-- 極太まゆ -->
  <path d="M36 41 L46 39.5" stroke="#1E1A16" stroke-width="3.4" stroke-linecap="round"/>
  <path d="M64 41 L54 39.5" stroke="#1E1A16" stroke-width="3.4" stroke-linecap="round"/>
  <!-- 目（かっと見開き） -->
  <ellipse cx="41" cy="45" rx="4" ry="4.6" fill="#FFFFFF"/>
  <ellipse cx="59" cy="45" rx="4" ry="4.6" fill="#FFFFFF"/>
  <circle cx="41" cy="45.5" r="2.4" fill="#3A2016"/>
  <circle cx="59" cy="45.5" r="2.4" fill="#3A2016"/>
  <circle cx="42" cy="44.3" r="1" fill="#FFFFFF"/>
  <circle cx="60" cy="44.3" r="1" fill="#FFFFFF"/>
  <!-- 鼻・気合いの口（開き） -->
  <path d="M50 48 L49.3 51" stroke="#B4835A" stroke-width="1.4" stroke-linecap="round"/>
  <path d="M44 54 Q50 60 56 54 Q50 57 44 54 Z" fill="#B73B33" stroke="#8A2A24" stroke-width="1.4"/>
</svg>
