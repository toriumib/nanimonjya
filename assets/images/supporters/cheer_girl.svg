  <path d="M45 41 Q50 45 55 41" fill="none" stroke="#B4322C" stroke-width="2.2" stroke-linecap="round"/>
  <circle cx="38" cy="39" r="3" fill="#F7A8A0" opacity="0.75"/>
  <circle cx="62" cy="39" r="3" fill="#F7A8A0" opacity="0.75"/>
