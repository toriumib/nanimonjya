  <path d="M64 18 L58 14 L60 22 Z" fill="#E8483F" stroke="#B4322C" stroke-width="1.8" stroke-linejoin="round"/>
  <circle cx="63.5" cy="18" r="2.2" fill="#B4322C"/>
  <!-- 目（ぱっちり） -->
  <circle cx="43" cy="34" r="3.6" fill="#6B4226"/>
  <circle cx="57" cy="34" r="3.6" fill="#6B4226"/>
  <circle cx="44.2" cy="32.8" r="1.3" fill="#FFFFFF"/>
  <circle cx="58.2" cy="32.8" r="1.3" fill="#FFFFFF"/>
  <path d="M39 29 Q43 27 46 29 M54 29 Q57 27 61 29" fill="none" stroke="#D9A93F" stroke-width="1.6" stroke-linecap="round"/>
