<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- SDチアガール（オリジナル・金髪ボブ＋赤リボン） -->
  <defs>
    <radialGradient id="blush" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FF97AE" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#FF97AE" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFE38A"/>
      <stop offset="1" stop-color="#F5C64E"/>
    </linearGradient>
  </defs>

  <!-- ポンポン（頭の高さまで振り上げ） -->
  <g stroke="#B4322C" stroke-width="0.8">
    <g fill="#F2564D"><circle cx="20" cy="26" r="4.5"/><circle cx="26" cy="22" r="4.5"/><circle cx="24" cy="30" r="4.5"/><circle cx="29" cy="28" r="4"/><circle cx="17" cy="30" r="3.8"/></g>
  </g>
  <g stroke="#D9A93F" stroke-width="0.8">
    <g fill="#FFD24A"><circle cx="80" cy="26" r="4.5"/><circle cx="74" cy="22" r="4.5"/><circle cx="76" cy="30" r="4.5"/><circle cx="71" cy="28" r="4"/><circle cx="83" cy="30" r="3.8"/></g>
  </g>

  <!-- 脚（短くちょこん） -->
  <path d="M44 84 L43 92" stroke="#F6CBA6" stroke-width="5" stroke-linecap="round"/>
  <path d="M56 84 L57 92" stroke="#F6CBA6" stroke-width="5" stroke-linecap="round"/>
  <ellipse cx="42.5" cy="93.5" rx="4" ry="2.6" fill="#FFFFFF" stroke="#4A3A2E" stroke-width="1.4"/>
  <ellipse cx="57.5" cy="93.5" rx="4" ry="2.6" fill="#FFFFFF" stroke="#4A3A2E" stroke-width="1.4"/>

  <!-- 腕（振り上げ・肌） -->
  <path d="M40 64 Q30 52 24 30" fill="none" stroke="#F6CBA6" stroke-width="5.5" stroke-linecap="round"/>
  <path d="M60 64 Q70 52 76 30" fill="none" stroke="#F6CBA6" stroke-width="5.5" stroke-linecap="round"/>

  <!-- スカート（赤プリーツ） -->
  <path d="M37 74 L63 74 L69 87 L31 87 Z" fill="#EE4E48" stroke="#B4322C" stroke-width="1.8" stroke-linejoin="round"/>
  <path d="M43 75 L41 86 M50 75 L50 87 M57 75 L59 86" stroke="#C63A34" stroke-width="1.5"/>

  <!-- 上着（白×赤ライン・小さめボディ） -->
  <path d="M38 60 Q50 56 62 60 L60 76 L40 76 Z" fill="#FFFFFF" stroke="#B4322C" stroke-width="1.8" stroke-linejoin="round"/>
  <path d="M40 69 L60 69" stroke="#EE4E48" stroke-width="3"/>
  <path d="M50 60 L50 76" stroke="#F0DADE" stroke-width="1"/>

  <!-- 髪（後ろ・大きめ輪郭） -->
  <path d="M22 40 Q18 8 50 6 Q82 8 78 40 Q74 30 68 30 L32 30 Q26 30 22 40 Z" fill="url(#hair)" stroke="#D9A93F" stroke-width="2" stroke-linejoin="round"/>

  <!-- 顔（大きい・SD比率） -->
  <circle cx="50" cy="38" r="25" fill="#FCE3C8" stroke="#E0B48A" stroke-width="1.4"/>

  <!-- 前髪（ぱっつん＋サイド） -->
  <path d="M25 40 Q24 12 50 10 Q76 12 75 40 Q72 25 62 24 Q66 34 58 32 Q52 20 42 25 Q34 28 33 39 Q30 42 25 40 Z" fill="url(#hair)" stroke="#D9A93F" stroke-width="2" stroke-linejoin="round"/>
  <path d="M25 39 Q22 52 29 56 Q31 46 28 39 Z" fill="url(#hair)" stroke="#D9A93F" stroke-width="1.8"/>
  <path d="M75 39 Q78 52 71 56 Q69 46 72 39 Z" fill="url(#hair)" stroke="#D9A93F" stroke-width="1.8"/>
  <path d="M40 16 Q50 12 60 16" fill="none" stroke="#FFF4C8" stroke-width="1.6" stroke-linecap="round" opacity="0.85"/>

  <!-- 赤リボン（サイド） -->
  <path d="M70 22 L79 16 L78 27 Z" fill="#EE4E48" stroke="#B4322C" stroke-width="1.4" stroke-linejoin="round"/>
  <path d="M70 22 L63 17 L65 28 Z" fill="#EE4E48" stroke="#B4322C" stroke-width="1.4" stroke-linejoin="round"/>
  <circle cx="69.5" cy="22.5" r="2.6" fill="#C0392B"/>

  <!-- 目（大きくうるうる） -->
  <ellipse cx="40" cy="40" rx="5.2" ry="6.6" fill="#FFFFFF"/>
  <ellipse cx="60" cy="40" rx="5.2" ry="6.6" fill="#FFFFFF"/>
  <ellipse cx="40.5" cy="41" rx="4" ry="5.2" fill="#8A5A34"/>
  <ellipse cx="60.5" cy="41" rx="4" ry="5.2" fill="#8A5A34"/>
  <circle cx="40.5" cy="41.5" r="2.2" fill="#3A2618"/>
  <circle cx="60.5" cy="41.5" r="2.2" fill="#3A2618"/>
  <circle cx="42" cy="38.5" r="1.8" fill="#FFFFFF"/>
  <circle cx="62" cy="38.5" r="1.8" fill="#FFFFFF"/>
  <circle cx="38.5" cy="43" r="1" fill="#FFFFFF"/>
  <circle cx="58.5" cy="43" r="1" fill="#FFFFFF"/>
  <!-- まつげ -->
  <path d="M34.5 34.5 Q40 32 46 35 M54 35 Q60 32 65.5 34.5" fill="none" stroke="#7A4A2A" stroke-width="1.6" stroke-linecap="round"/>

  <!-- ほっぺ -->
  <circle cx="33" cy="46" r="4.5" fill="url(#blush)"/>
  <circle cx="67" cy="46" r="4.5" fill="url(#blush)"/>
  <!-- 口（にっこり） -->
  <path d="M45 48 Q50 53 55 48" fill="none" stroke="#C0392B" stroke-width="1.8" stroke-linecap="round"/>
</svg>
