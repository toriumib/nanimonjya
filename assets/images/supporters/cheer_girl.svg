  <circle cx="50" cy="33" r="19" fill="#FBE0C4" stroke="#C99A6E" stroke-width="2"/>
  <!-- 金髪ボブ -->
  <path d="M31 34 Q28 12 50 11 Q72 12 69 34 Q69 22 61 20 Q66 28 60 27 Q52 15 40 20 Q33 23 33 32 Q31 36 31 34 Z" fill="#F7D774" stroke="#D9A93F" stroke-width="2.5" stroke-linejoin="round"/>
