<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- チアガール（錦木風の雰囲気オマージュ・完全オリジナル）: 金髪ボブ＋赤リボン -->
  <defs>
    <radialGradient id="cg_cheek" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FF9DB0" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#FF9DB0" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- ポンポン（両手上げ・もこもこ） -->
  <g fill="#E8483F" stroke="#B4322C" stroke-width="1">
    <circle cx="12" cy="30" r="5.5"/><circle cx="19" cy="25" r="5.5"/><circle cx="16" cy="35" r="5.5"/><circle cx="22" cy="31" r="5"/><circle cx="9" cy="35" r="4.5"/>
  </g>
  <g fill="#FFD24A" stroke="#D9A93F" stroke-width="1">
    <circle cx="88" cy="30" r="5.5"/><circle cx="81" cy="25" r="5.5"/><circle cx="84" cy="35" r="5.5"/><circle cx="78" cy="31" r="5"/><circle cx="91" cy="35" r="4.5"/>
  </g>
  <!-- 腕 -->
  <path d="M31 54 L18 34" stroke="#F7C9A6" stroke-width="6" stroke-linecap="round"/>
  <path d="M69 54 L82 34" stroke="#F7C9A6" stroke-width="6" stroke-linecap="round"/>
  <!-- スカート（赤プリーツ） -->
  <path d="M35 74 L65 74 L74 90 L26 90 Z" fill="#E8483F" stroke="#B4322C" stroke-width="2.5" stroke-linejoin="round"/>
  <path d="M42 75 L40 89 M50 75 L50 90 M58 75 L60 89" stroke="#B4322C" stroke-width="2"/>
  <!-- 脚 -->
  <path d="M43 90 L42 97 M57 90 L58 97" stroke="#F7C9A6" stroke-width="5" stroke-linecap="round"/>
  <!-- 上着（白×赤ライン） -->
  <path d="M34 52 L66 52 L64 76 L36 76 Z" fill="#FFFFFF" stroke="#B4322C" stroke-width="2.5" stroke-linejoin="round"/>
  <path d="M36 67 L64 67" stroke="#E8483F" stroke-width="5"/>
  <path d="M50 52 L50 76" stroke="#F3D6DA" stroke-width="1.5"/>
  <!-- 顔（丸くやわらか） -->
  <circle cx="50" cy="33" r="20" fill="#FCE3C8" stroke="#D9A97E" stroke-width="1.5"/>
  <!-- 金髪ボブ（内巻き・ツヤ） -->
  <path d="M29 35 Q26 10 50 9 Q74 10 71 35 Q71 21 62 19 Q67 29 60 27 Q52 14 40 19 Q32 22 32 33 Q30 37 29 35 Z" fill="#F8DA78" stroke="#D9A93F" stroke-width="2.5" stroke-linejoin="round"/>
  <path d="M29 34 Q26 45 33 48 Q35 39 32 33 Z" fill="#F8DA78" stroke="#D9A93F" stroke-width="2"/>
  <path d="M71 34 Q74 45 67 48 Q65 39 68 33 Z" fill="#F8DA78" stroke="#D9A93F" stroke-width="2"/>
  <path d="M40 14 Q50 11 60 15" fill="none" stroke="#FFF0B8" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <!-- 赤リボン（サイド・立体） -->
  <path d="M66 17 L75 11 L74 21 Z" fill="#E8483F" stroke="#B4322C" stroke-width="1.8" stroke-linejoin="round"/>
  <path d="M66 17 L59 12 L61 22 Z" fill="#E8483F" stroke="#B4322C" stroke-width="1.8" stroke-linejoin="round"/>
  <circle cx="65.5" cy="17" r="2.6" fill="#C0392B"/>
  <!-- 目（大きくうるうる・ハイライト2つ） -->
  <ellipse cx="42" cy="34" rx="4.4" ry="5.2" fill="#5A3A22"/>
  <ellipse cx="58" cy="34" rx="4.4" ry="5.2" fill="#5A3A22"/>
  <circle cx="43.6" cy="32" r="1.8" fill="#FFFFFF"/>
  <circle cx="59.6" cy="32" r="1.8" fill="#FFFFFF"/>
  <circle cx="40.6" cy="35.5" r="1" fill="#FFFFFF"/>
  <circle cx="56.6" cy="35.5" r="1" fill="#FFFFFF"/>
  <!-- まつ毛・眉 -->
  <path d="M37.5 29.5 Q42 27.5 46.5 29.5 M53.5 29.5 Q58 27.5 62.5 29.5" fill="none" stroke="#D9A93F" stroke-width="1.6" stroke-linecap="round"/>
  <!-- ほっぺ -->
  <circle cx="37" cy="40" r="5" fill="url(#cg_cheek)"/>
  <circle cx="63" cy="40" r="5" fill="url(#cg_cheek)"/>
  <!-- にっこり口 -->
  <path d="M45 42 Q50 47 55 42" fill="none" stroke="#C0392B" stroke-width="2.2" stroke-linecap="round"/>
</svg>
