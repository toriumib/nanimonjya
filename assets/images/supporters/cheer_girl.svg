  <g fill="#E8483F">
    <circle cx="13" cy="30" r="5"/><circle cx="19" cy="26" r="5"/><circle cx="16" cy="34" r="5"/><circle cx="21" cy="31" r="4.5"/>
  </g>
  <g fill="#FFD24A">
    <circle cx="87" cy="30" r="5"/><circle cx="81" cy="26" r="5"/><circle cx="84" cy="34" r="5"/><circle cx="79" cy="31" r="4.5"/>
  </g>
  <!-- 腕 -->
  <path d="M30 52 L19 33" stroke="#F5C9A2" stroke-width="5" stroke-linecap="round"/>
  <path d="M70 52 L81 33" stroke="#F5C9A2" stroke-width="5" stroke-linecap="round"/>
