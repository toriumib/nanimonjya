<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- SD応援団・黄（ニヒル・メガホン・丸サングラス） -->
  <!-- 脚 -->
  <path d="M44 86 L44 93" stroke="#1B1E2A" stroke-width="6" stroke-linecap="round"/>
  <path d="M56 86 L56 93" stroke="#1B1E2A" stroke-width="6" stroke-linecap="round"/>
  <!-- 学ラン -->
  <path d="M36 66 Q50 62 64 66 L62 88 L38 88 Z" fill="#262A3A" stroke="#12141C" stroke-width="1.8" stroke-linejoin="round"/>
  <path d="M50 64 L50 88" stroke="#12141C" stroke-width="1.6"/>
  <circle cx="50" cy="70" r="1.3" fill="#E8C24A"/><circle cx="50" cy="76" r="1.3" fill="#E8C24A"/><circle cx="50" cy="82" r="1.3" fill="#E8C24A"/>
  <!-- 左腕（下） -->
  <path d="M38 70 Q44 76 50 74" fill="none" stroke="#12141C" stroke-width="6" stroke-linecap="round"/>
  <!-- メガホン（右手で構える） -->
  <path d="M62 68 L78 61 L80 74 L64 78 Z" fill="#FFD24A" stroke="#C9942C" stroke-width="1.8" stroke-linejoin="round"/>
  <path d="M50 74 L64 73" stroke="#EFCEA6" stroke-width="5" stroke-linecap="round"/>
  <!-- 首（頭と体をつなぐ） -->
  <path d="M45.5 55 L45.5 67 Q50 69.5 54.5 67 L54.5 55 Z" fill="#EFCEA6" stroke="#C49468" stroke-width="1.2"/>
  <!-- 詰襟（学ランの白カラー） -->
  <path d="M41 67 Q50 63 59 67 L58 71 Q50 67.5 42 71 Z" fill="#EEEEEE" stroke="#BFC3CC" stroke-width="0.9"/>
  <!-- 顔 -->
  <circle cx="50" cy="38" r="24" fill="#EFCEA6" stroke="#C49468" stroke-width="1.4"/>
  <!-- 七三の髪 -->
  <path d="M28 34 Q26 12 50 10 Q74 12 72 34 Q66 20 44 21 Q32 22 30 36 Q28 38 28 34 Z" fill="#3A2E24" stroke="#1E1712" stroke-width="1.6" stroke-linejoin="round"/>
  <!-- 黄ハチマキ -->
  <path d="M28 30 L72 30 L72 37 L28 37 Z" fill="#F2C93A" stroke="#C9942C" stroke-width="1.6"/>
  <path d="M28 31 L16 27 L20 38 L28 36 Z" fill="#F2C93A" stroke="#C9942C" stroke-width="1.6"/>
  <!-- 丸サングラス -->
  <circle cx="40" cy="42" r="6" fill="#2A2A2A" stroke="#111" stroke-width="1.6" opacity="0.9"/>
  <circle cx="60" cy="42" r="6" fill="#2A2A2A" stroke="#111" stroke-width="1.6" opacity="0.9"/>
  <path d="M46 42 L54 42" stroke="#111" stroke-width="1.8"/>
  <path d="M37 40 Q40 38.5 43 40 M57 40 Q60 38.5 63 40" fill="none" stroke="#FFFFFF" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <!-- 鼻・ニヤリ -->
  <path d="M50 46 L49.4 49" stroke="#C49468" stroke-width="1.4" stroke-linecap="round"/>
  <path d="M43 52 Q52 56 57 50" fill="none" stroke="#7A5636" stroke-width="1.9" stroke-linecap="round"/>
</svg>
